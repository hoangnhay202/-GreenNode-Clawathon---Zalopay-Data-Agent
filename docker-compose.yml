version: "3.8"
services:
  teams-agent:
    build: .
    ports:
      - "8080:8080"
    env_file:
      - .env
    volumes:
      # Persist APScheduler SQLite DB across container restarts
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 1h
      timeout: 30s
      retries: 3
      start_period: 20s
